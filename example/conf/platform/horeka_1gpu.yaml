# @package _global_

######
# This example config requests a job with 1 GPU and 38 CPU cores (152/4=38).
######

defaults:
  - override /hydra/launcher: clusterduck_slurm
  - _self_

hydra:
  mode: MULTIRUN  # needed for launcher to be used
  launcher:
    # general
    account: EXAMPLE
    partition: accelerated
    exclude: null # add any broken nodes here
    constraint: LSDF  # make the LSDF available at $LSDF

    # compute resources
    timeout_min: 2880  # 48 hours
    gres: gpu:1  # request 1 gpu per job
    cpus_per_task: 38  # there are 152 cpus per node (152/4=38)

    setup:
      - echo "[$(date +'%Y-%m-%d %H:%M:%S,%3N')] Setup for job $SLURM_JOB_ID"
      # Create wandb folder in fast, job-local storage: https://www.nhr.kit.edu/userdocs/horeka/filesystems/#tmpdir
      # NOTE: wandb folder will be deleted after job completion, but by then it will have synced with server
      - export WANDB_DIR=$TMPDIR/wandb
      - mkdir -pv $WANDB_DIR

    teardown:
      - echo "[$(date +'%Y-%m-%d %H:%M:%S,%3N')] Teardown for job $SLURM_JOB_ID"
