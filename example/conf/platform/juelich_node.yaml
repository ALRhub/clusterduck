# @package _global_

######
# This example config requests a job with 4 GPUs and 48 CPU cores.
######

defaults:
  - override /hydra/launcher: clusterduck_slurm
  - _self_

hydra:
  mode: MULTIRUN  # needed for launcher to be used
  launcher:
    # general
    account: EXAMPLE
    partition: booster
    exclude: null # add any broken nodes here

    # compute resources
    timeout_min: 1440  # 24 hours
    gres: gpu:4  # request 4 gpus per job
    cpus_per_task: 48  # each node has 48 physical cores

    setup:
      - echo "[$(date +'%Y-%m-%d %H:%M:%S,%3N')] Setup for job $SLURM_JOB_ID"

    teardown:
      - echo "[$(date +'%Y-%m-%d %H:%M:%S,%3N')] Teardown for job $SLURM_JOB_ID"
