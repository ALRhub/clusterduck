# @package _global_

defaults:
  - override /hydra/launcher: clusterduck_slurm
  - _self_

hydra:
  mode: MULTIRUN  # needed for launcher to be used
  launcher:
    # general
    account: hk-project-p0024023
    partition: accelerated
    constraint: LSDF

    # compute resources
    timeout_min: 2880  # 48 hours
    cpus_per_task: 38
    gres: gpu:4
    parallel_tasks_per_job: 4
    srun_kwargs:
      gres: gpu:1

    setup:
      - export SLURM_JOB_ID=123456
      - export SLURM_NTASKS=4
      # modify these values to simulate how different tasks
      - export SLURM_ARRAY_TASK_ID=0
      - export SLURM_PROCID=0

    use_srun: False
    do_submit: False

  verbose: clusterduck
