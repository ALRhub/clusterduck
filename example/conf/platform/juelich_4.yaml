# @package _global_

defaults:
  - override /hydra/launcher: clusterduck_slurm
  - _self_

hydra:
  mode: MULTIRUN  # needed for launcher to be used
  launcher:
    # general
    account: EXAMPLE
    partition: booster
    exclude: null # add any broken nodes here

    # compute resources
    timeout_min: 1440  # 24 hours
    gres: gpu:4  # request 4 gpus per job, but we'll actually use 1 per task and run 4 tasks in parallel on the same node
    cpus_per_task: 12
    gpus_per_task: 1

    tasks_per_node: 4  # run 4 tasks in parallel on the same node, each using 1 gpu (total 4 gpus per node)

    setup:
      - echo "[$(date +'%Y-%m-%d %H:%M:%S,%3N')] Setup for job $SLURM_JOB_ID"

    teardown:
      - echo "[$(date +'%Y-%m-%d %H:%M:%S,%3N')] Teardown for job $SLURM_JOB_ID"
